@if (outputs().length > 0) {
  <mat-expansion-panel class="results-panel" expanded>
    <mat-expansion-panel-header>
      <mat-panel-title>Results</mat-panel-title>
      <mat-panel-description>{{ outputs().length }} file(s)</mat-panel-description>
    </mat-expansion-panel-header>

    <mat-list>
      @for (output of outputs(); track output.name) {
        <mat-list-item>
          <mat-icon matListItemIcon>{{ getIcon(output.type) }}</mat-icon>
          <span matListItemTitle>{{ output.name }}</span>
          <span matListItemLine class="file-type">{{ output.type }}</span>
          <button mat-icon-button matListItemMeta (click)="downloadOutput(output)">
            <mat-icon>download</mat-icon>
          </button>
        </mat-list-item>
      }
    </mat-list>

    <div class="actions">
      <button mat-raised-button color="accent" (click)="downloadAll()">
        <mat-icon>folder_zip</mat-icon>
        Download All
      </button>
    </div>
  </mat-expansion-panel>
}
